# .github/workflows/socket.yml

name: ⚡️ Security Scan

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  security-scan:
    permissions:
      issues: write
      contents: read
      pull-requests: write
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run Socket Basics
        # Pin to a commit SHA for supply-chain safety.
        # Dependabot will keep this up to date automatically — see docs/github-action.md.
        #
        # https://github.com/SocketDev/socket-basics/blob/main/docs/github-action.md#pinning-strategies
        #
        # https://github.com/SocketDev/socket-basics/releases
        #
        # To find the SHA for a given version, you can use:
        # git ls-remote https://github.com/SocketDev/socket-basics refs/tags/v2.0.0
        uses: SocketDev/socket-basics@933940968bf73a35a63d5594e78a27d0b2a8c2d3  # v2.0.2
        env:
          GITHUB_PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          socket_security_api_key: ${{ secrets.SOCKET_SECURITY_API_KEY }}